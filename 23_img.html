<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>產品照片</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* 延續前面頁面的藍色漸層背景 */
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 50%, #93c5fd 100%);
            padding: 40px 20px;
        }

        /* 頁面大標題 */
        .page-title {
            color: white;
            font-size: 2.2rem;
            font-family: 'Segoe UI', sans-serif;
            margin-bottom: 40px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
            text-align: center;
        }

        /* 毛玻璃相簿外大框 */
        .gallery-container {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            max-width: 1100px;
            width: 100%;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);

            display: flex;
            justify-content: center;
            gap: 25px;
        }

        /* 照片卡片外框 */
        .photo-card {
            flex: 1;
            /* 關鍵修改：刪除 aspect-ratio: 4 / 5; 讓高度不被綁死 */
            background: white;
            padding: 12px;
            border-radius: 16px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            
            /* 確保卡片高度自動跟隨內容 */
            height: auto; 
        }

        /* 2. 找到 .photo-card img，修改這裡 */
        .photo-card img {
            width: 100%;
            height: auto;        /* 關鍵修改：高度設為 auto，照片原本多高就呈現多高 */
            /* 關鍵修改：刪除 object-fit: cover; 這樣就不會再亂切照片了 */
            border-radius: 8px;
            transition: transform 0.5s ease;
            display: block;      /* 讓圖片排版邊距更乾淨 */
        }

        /* 照片本身 */
        .photo-card img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* 關鍵修改：改成 contain */
            border-radius: 8px;
            transition: transform 0.5s ease;
        }

        /* 滑鼠移上去的互動效果 */
        .photo-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        }

        .photo-card:hover img {
            transform: scale(1.05);
        }

        /* 🛠️ 新增：右下角固定按鈕樣式 */
        .fixed-btn {
            position: fixed;
            bottom: 30px;  /* 距離底部 30 像素 */
            right: 30px;   /* 距離右邊 30 像素 */
            background-color: #ffffff;
            color: #1e40af;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 30px; /* 膠囊狀圓角 */
            font-weight: bold;
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.95rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            z-index: 1000; /* 確保按鈕永遠疊在最上層，不會被照片遮住 */
            
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 右下角按鈕滑鼠懸停效果 */
        .fixed-btn:hover {
            background-color: #1e40af;
            color: #ffffff;
            transform: translateY(-3px); /* 微微往上浮起 */
            box-shadow: 0 15px 30px rgba(30, 64, 175, 0.4);
        }

        /* 📱 手機版調整 */
        @media (max-width: 768px) {
            .gallery-container {
                flex-direction: column;
                padding: 20px;
                gap: 20px;
            }
            .photo-card {
                aspect-ratio: 4 / 3;
            }
            /* 手機版按鈕可以稍微縮小一點點或移高一點，避免擋到內容 */
            .fixed-btn {
                bottom: 20px;
                right: 20px;
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <h1 class="page-title">產品照片</h1>

    <div class="gallery-container">
        <div class="photo-card">
            <img src="img/23/01.jpeg" alt="產品照片 1">
        </div>
        <div class="photo-card">
            <img src="img/23/02.jpeg" alt="產品照片 2">
        </div>
        <!-- <div class="photo-card">
            <img src="img/22/03.jpeg" alt="產品照片 3">
        </div>
        <div class="photo-card">
            <img src="img/22/04.jpeg" alt="產品照片 4">
        </div>
        <div class="photo-card">
            <img src="img/21/05.JPG" alt="產品照片 4">
        </div> -->
    </div>

    <a href="floor_table_stall.html" class="fixed-btn">
        ⬅️ 返回攤商
    </a>

</body>
</html>
